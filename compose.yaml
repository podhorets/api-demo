services:
  api-demo:
    image: api-demo
    build:
      context: .
      dockerfile: api-demo/Dockerfile
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: api-demo-user
      POSTGRES_PASSWORD: api-demo-pw
      POSTGRES_DB: api-demo
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
